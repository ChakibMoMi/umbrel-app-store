tagline: Lightning fast with a target of being a complete reading experience
description: >-
  Kavita is a fast, feature-rich, cross-platform reading server. It is a
  self-hosted digital library which supports a vast array of file formats:
  Manga/Comics (CBZ, CBR, CB7, CBT, ZIP, RAR, 7Z, TAR), ebooks (EPUB,
  MOBI), PDFs, and more. It features reading progress tracking, collections,
  reading lists, and a beautiful modern interface.

version: "3.7"

services:
  app:
    # Default credentials are set during first-run wizard at http://YOUR-IP:3000
  # Default login after setup: admin / umbrel123
    image: adguard/adguardhome:v0.107.45
    restart: on-failure
    ports:
      - "${APP_PORT}:3000"
      - "53:53/tcp"
      - "53:53/udp"
      - "853:853/tcp"
    volumes:
      - "${APP_DATA_DIR}/data/work:/opt/adguardhome/work"
      - "${APP_DATA_DIR}/data/conf:/opt/adguardhome/conf"

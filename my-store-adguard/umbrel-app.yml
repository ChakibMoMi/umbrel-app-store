manifestVersion: 1
id: my-store-adguard
category: networking
name: AdGuard Home
version: "0.107.45"
tagline: Network-wide ads and trackers blocking DNS server
description: >-
  AdGuard Home is a network-wide software for blocking ads and tracking.
  After you set it up, it will cover ALL your home devices, and you don't need
  any client-side software for that. It operates as a DNS server that re-routes
  tracking domains to a "black hole," preventing your devices from connecting
  to those servers.
developer: AdGuard Software
website: https://adguard.com/en/adguard-home/overview.html
icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/adguard-home.png
dependencies: []
repo: https://github.com/AdguardTeam/AdGuardHome
support: https://github.com/AdguardTeam/AdGuardHome/discussions
port: 3000
gallery:
  - https://image.thum.io/get/width/1280/noanimate/https://adguard.com/en/adguard-home/overview.html
path: ""
defaultUsername: "admin"
defaultPassword: "changeme"
torOnly: false

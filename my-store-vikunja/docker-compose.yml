version: "3.7"

services:
  app:
    image: vikunja/vikunja:0.23.0
    restart: on-failure
    ports:
      - "${APP_PORT}:3456"
    environment:
      - VIKUNJA_DATABASE_HOST=db
      - VIKUNJA_DATABASE_PASSWORD=vikunja_pass
      - VIKUNJA_DATABASE_TYPE=mysql
      - VIKUNJA_DATABASE_USER=vikunja
      - VIKUNJA_DATABASE_DATABASE=vikunja
      - VIKUNJA_SERVICE_JWTSECRET=changethisjwtsecretkey
    volumes:
      - "${APP_DATA_DIR}/data/files:/app/vikunja/files"
    depends_on:
      - db

  db:
    image: mariadb:10.11
    restart: on-failure
    environment:
      - MYSQL_ROOT_PASSWORD=root_pass
      - MYSQL_DATABASE=vikunja
      - MYSQL_USER=vikunja
      - MYSQL_PASSWORD=vikunja_pass
    volumes:
      - "${APP_DATA_DIR}/data/db:/var/lib/mysql"

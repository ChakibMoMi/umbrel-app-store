version: "3.7"

services:
  app:
    image: nextcloud:28.0.3
    restart: on-failure
    ports:
      - "${APP_PORT}:80"
    environment:
      - MYSQL_HOST=db
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - MYSQL_PASSWORD=nextcloud_pass
      - NEXTCLOUD_ADMIN_USER=admin
      - NEXTCLOUD_ADMIN_PASSWORD=umbrel123
    volumes:
      - "${APP_DATA_DIR}/data/nextcloud:/var/www/html"
    depends_on:
      - db

  db:
    image: mariadb:10.11
    restart: on-failure
    environment:
      - MYSQL_ROOT_PASSWORD=root_pass
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - MYSQL_PASSWORD=nextcloud_pass
    volumes:
      - "${APP_DATA_DIR}/data/db:/var/lib/mysql"

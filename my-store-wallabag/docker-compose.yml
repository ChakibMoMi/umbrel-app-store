version: "3.7"

services:
  app:
    image: wallabag/wallabag:2.6.9
    restart: on-failure
    ports:
      - "${APP_PORT}:80"
    environment:
      - MYSQL_ROOT_PASSWORD=root_pass
      - SYMFONY__ENV__DATABASE_DRIVER=pdo_mysql
      - SYMFONY__ENV__DATABASE_HOST=db
      - SYMFONY__ENV__DATABASE_PORT=3306
      - SYMFONY__ENV__DATABASE_NAME=wallabag
      - SYMFONY__ENV__DATABASE_USER=wallabag
      - SYMFONY__ENV__DATABASE_PASSWORD=wallabag_pass
      - SYMFONY__ENV__DATABASE_CHARSET=utf8mb4
      - SYMFONY__ENV__MAILER_HOST=127.0.0.1
      - SYMFONY__ENV__FROM_EMAIL=wallabag@example.com
      - SYMFONY__ENV__DOMAIN_NAME=http://localhost:${APP_PORT}
      - SYMFONY__ENV__SERVER_NAME="Wallabag"
    volumes:
      - "${APP_DATA_DIR}/data/images:/var/www/wallabag/web/assets/images"
    depends_on:
      - db

  db:
    image: mariadb:10.11
    restart: on-failure
    environment:
      - MYSQL_ROOT_PASSWORD=root_pass
      - MYSQL_DATABASE=wallabag
      - MYSQL_USER=wallabag
      - MYSQL_PASSWORD=wallabag_pass
    volumes:
      - "${APP_DATA_DIR}/data/db:/var/lib/mysql"

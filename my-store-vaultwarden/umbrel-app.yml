manifestVersion: 1
id: my-store-vaultwarden
category: productivity
name: Vaultwarden
version: "1.30.3"
tagline: Unofficial Bitwarden-compatible server written in Rust
description: >-
  Vaultwarden is a lightweight, open-source implementation of the Bitwarden
  password management server. It is fully compatible with the official Bitwarden
  clients (browser extensions, desktop & mobile apps). Store your passwords,
  secure notes and payment cards safely on your own server.

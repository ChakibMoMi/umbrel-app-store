version: "3.7"

services:
  app:
    image: netdata/netdata:v1.44.3
    restart: on-failure
    ports:
      - "${APP_PORT}:19999"
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    volumes:
      - "${APP_DATA_DIR}/data/netdataconfig:/etc/netdata"
      - "${APP_DATA_DIR}/data/netdatalib:/var/lib/netdata"
      - "${APP_DATA_DIR}/data/netdatacache:/var/cache/netdata"
      - /etc/passwd:/host/etc/passwd:ro
      - /etc/group:/host/etc/group:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/os-release:/host/etc/os-release:ro

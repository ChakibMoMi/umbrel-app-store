version: "3.7"

services:
  app:
    image: grafana/grafana:10.3.3
    restart: on-failure
    ports:
      - "${APP_PORT}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=umbrel123
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - "${APP_DATA_DIR}/data:/var/lib/grafana"

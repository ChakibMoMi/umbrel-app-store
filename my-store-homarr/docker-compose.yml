version: "3.7"

services:
  app:
    image: ghcr.io/ajnart/homarr:0.15.3
    restart: on-failure
    ports:
      - "${APP_PORT}:7575"
    volumes:
      - "${APP_DATA_DIR}/data/configs:/app/data/configs"
      - "${APP_DATA_DIR}/data/icons:/app/public/icons"
      - "${APP_DATA_DIR}/data/db:/data"
      - /var/run/docker.sock:/var/run/docker.sock:ro

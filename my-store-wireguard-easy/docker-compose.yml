version: "3.7"

services:
  app:
    image: ghcr.io/wg-easy/wg-easy:13
    restart: on-failure
    ports:
      - "${APP_PORT}:51821"
    environment:
      - WG_HOST=YOUR_SERVER_IP
      - PASSWORD=umbrel123
      - WG_PORT=51820
      - WG_DEFAULT_ADDRESS=10.8.0.x
      - WG_DEFAULT_DNS=1.1.1.1
      - WG_MTU=1420
    volumes:
      - "${APP_DATA_DIR}/data:/etc/wireguard"
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1

id: my-store-nodered
category: vehicles
name: Node-RED
version: "3.1.7"
tagline: Low-code programming for event-driven vehicle & IoT automation
description: >-
  Node-RED is a flow-based programming tool for wiring together hardware devices,
  APIs, and online services. In the vehicle context, it can interface with MQTT,
  OBDII/ELM327 adapters, Tesla API, BMW ConnectedDrive, Volkwagen We Connect,
  Mercedes me, and others to build custom vehicle dashboards, automation flows,
  and notifications. A massive library of community nodes for any integration.
developer: OpenJS Foundation

version: "3.7"

services:
  app:
    image: sissbruecker/linkding:1.27.0
    restart: on-failure
    ports:
      - "${APP_PORT}:9090"
    environment:
      - LD_SUPERUSER_NAME=admin
      - LD_SUPERUSER_PASSWORD=umbrel123
      - LD_ENABLE_AUTH_PROXY=False
      - LD_REQUEST_TIMEOUT=60
      - LD_SERVER_PORT=9090
    volumes:
      - "${APP_DATA_DIR}/data:/etc/linkding/data"

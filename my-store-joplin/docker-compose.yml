version: "3.7"

services:
  app:
    image: joplin/server:3.0.1-beta
    restart: on-failure
    ports:
      - "${APP_PORT}:22300"
    environment:
      - APP_PORT=22300
      - APP_BASE_URL=http://localhost:${APP_PORT}
      - DB_CLIENT=pg
      - POSTGRES_PASSWORD=joplin_pass
      - POSTGRES_DATABASE=joplin
      - POSTGRES_USER=joplin
      - POSTGRES_PORT=5432
      - POSTGRES_HOST=db
    depends_on:
      - db

  db:
    image: postgres:15
    restart: on-failure
    environment:
      - POSTGRES_PASSWORD=joplin_pass
      - POSTGRES_USER=joplin
      - POSTGRES_DB=joplin
    volumes:
      - "${APP_DATA_DIR}/data/db:/var/lib/postgresql/data"

version: "3.7"

services:
  app:
    image: ghcr.io/paperless-ngx/paperless-ngx:2.6.3
    restart: on-failure
    ports:
      - "${APP_PORT}:8000"
    environment:
      - PAPERLESS_REDIS=redis://redis:6379
      - PAPERLESS_DBHOST=db
      - PAPERLESS_DBUSER=paperless
      - PAPERLESS_DBPASS=paperless_pass
      - PAPERLESS_DBNAME=paperless
      - PAPERLESS_ADMIN_USER=admin
      - PAPERLESS_ADMIN_PASSWORD=umbrel123
      - PAPERLESS_SECRET_KEY=thisissupersecretchangeme
      - PAPERLESS_TIME_ZONE=Europe/Berlin
      - PAPERLESS_OCR_LANGUAGE=deu+eng
    volumes:
      - "${APP_DATA_DIR}/data/media:/usr/src/paperless/media"
      - "${APP_DATA_DIR}/data/export:/usr/src/paperless/export"
      - "${APP_DATA_DIR}/data/consume:/usr/src/paperless/consume"
    depends_on:
      - db
      - redis

  db:
    image: postgres:15
    restart: on-failure
    environment:
      - POSTGRES_DB=paperless
      - POSTGRES_USER=paperless
      - POSTGRES_PASSWORD=paperless_pass
    volumes:
      - "${APP_DATA_DIR}/data/db:/var/lib/postgresql/data"

  redis:
    image: redis:7-alpine
    restart: on-failure
    volumes:
      - "${APP_DATA_DIR}/data/redis:/data"

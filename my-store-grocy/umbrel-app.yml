dependencies: []
repo: https://github.com/grocy/grocy
support: https://github.com/grocy/grocy/discussions
port: 80
gallery:
  - https://image.thum.io/get/width/1280/noanimate/https://grocy.info
path: ""
defaultUsername: "admin"
defaultPassword: ""
torOnly: false

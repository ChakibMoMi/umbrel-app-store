version: "3.7"

services:
  app:
    image: crowdsecurity/crowdsec:v1.6.2
    restart: on-failure
    ports:
      - "${APP_PORT}:8080"
    environment:
      - GID=1000
      - COLLECTIONS=crowdsecurity/linux crowdsecurity/sshd
    volumes:
      - "${APP_DATA_DIR}/data/config:/etc/crowdsec"
      - "${APP_DATA_DIR}/data/data:/var/lib/crowdsec/data"
      - /var/log:/var/log:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro

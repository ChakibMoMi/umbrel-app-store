version: "3.7"

services:
  wazuh-manager:
    image: wazuh/wazuh-manager:4.7.3
    restart: on-failure
    ports:
      - "1514:1514/udp"
      - "1515:1515"
      - "514:514/udp"
      - "55000:55000"
    environment:
      - INDEXER_URL=https://wazuh-indexer:9200
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=SecretPassword
      - FILEBEAT_SSL_VERIFICATION_MODE=full
    volumes:
      - "${APP_DATA_DIR}/data/wazuh_api_configuration:/var/ossec/api/configuration"
      - "${APP_DATA_DIR}/data/wazuh_etc:/var/ossec/etc"
      - "${APP_DATA_DIR}/data/wazuh_logs:/var/ossec/logs"
      - "${APP_DATA_DIR}/data/wazuh_queue:/var/ossec/queue"

  wazuh-dashboard:
    image: wazuh/wazuh-dashboard:4.7.3
    restart: on-failure
    ports:
      - "${APP_PORT}:443"
    environment:
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=SecretPassword
      - WAZUH_API_URL=https://wazuh-manager
      - DASHBOARD_USERNAME=kibanaserver
      - DASHBOARD_PASSWORD=kibanaserver
      - API_USERNAME=wazuh-wui
      - API_PASSWORD=MyS3cr37P450r.*-
    depends_on:
      - wazuh-manager

  wazuh-indexer:
    image: wazuh/wazuh-indexer:4.7.3
    restart: on-failure
    environment:
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - "${APP_DATA_DIR}/data/wazuh-indexer-data:/var/lib/wazuh-indexer"

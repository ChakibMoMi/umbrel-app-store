version: "3.7"

services:
  app:
    image: ghcr.io/mealie-recipes/mealie:v1.3.2
    restart: on-failure
    ports:
      - "${APP_PORT}:9000"
    environment:
      - ALLOW_SIGNUP=true
      - TZ=Europe/Berlin
      - BASE_URL=http://localhost:${APP_PORT}
    volumes:
      - "${APP_DATA_DIR}/data:/app/data"

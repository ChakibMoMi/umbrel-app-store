version: "3.7"

services:
  app:
    image: lscr.io/linuxserver/bookstack:24.02
    restart: on-failure
    ports:
      - "${APP_PORT}:80"
    environment:
      - PUID=1000
      - PGID=1000
      - APP_URL=http://localhost:${APP_PORT}
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=bookstack
      - DB_PASS=bookstack_pass
      - DB_DATABASE=bookstack
    volumes:
      - "${APP_DATA_DIR}/data/app:/config"
    depends_on:
      - db

  db:
    image: mariadb:10.11
    restart: on-failure
    environment:
      - MYSQL_ROOT_PASSWORD=root_pass
      - MYSQL_DATABASE=bookstack
      - MYSQL_USER=bookstack
      - MYSQL_PASSWORD=umbrel123
    volumes:
      - "${APP_DATA_DIR}/data/db:/var/lib/mysql"

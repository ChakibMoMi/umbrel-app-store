manifestVersion: 1
id: my-store-nginx-proxy-manager
category: networking
name: Nginx Proxy Manager
version: "2.11.2"
tagline: Expose your services easily and securely
description: >-
  Nginx Proxy Manager enables you to easily forward your web services whether
  they use HTTP or not. All this without knowing too much about Nginx or
  Letsencrypt. Come with a fully featured admin panel, SSL certificate
  management via Let's Encrypt, access lists, and redirection management.
developer: Jamie Curnow
website: https://nginxproxymanager.com
icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/nginx-proxy-manager.png
dependencies: []
repo: https://github.com/NginxProxyManager/nginx-proxy-manager
support: https://reddit.com/r/nginxproxymanager
port: 81
gallery:
  - https://image.thum.io/get/width/1280/noanimate/https://nginxproxymanager.com
path: ""
defaultUsername: "admin@example.com"
defaultPassword: "changeme"
torOnly: false

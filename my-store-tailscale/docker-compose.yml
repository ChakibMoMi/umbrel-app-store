version: "3.7"

services:
  app:
    image: tailscale/tailscale:v1.60.0
    restart: on-failure
    hostname: umbrel-tailscale
    environment:
      - TS_AUTHKEY=YOUR_TAILSCALE_AUTHKEY
      - TS_ROUTES=192.168.1.0/24
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=true
    volumes:
      - "${APP_DATA_DIR}/data:/var/lib/tailscale"
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    network_mode: host

version: "3.7"

services:
  app:
    image: pihole/pihole:2024.02.0
    restart: on-failure
    ports:
      - "${APP_PORT}:80"
    environment:
      - TZ=Europe/Berlin
      - WEBPASSWORD=umbrel123
      - PIHOLE_DNS_=8.8.8.8;8.8.4.4
    volumes:
      - "${APP_DATA_DIR}/data/pihole:/etc/pihole"
      - "${APP_DATA_DIR}/data/dnsmasq.d:/etc/dnsmasq.d"
    cap_add:
      - NET_ADMIN
